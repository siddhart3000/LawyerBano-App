name: lawyerbano_app
description: "A comprehensive legal platform for lawyers and clients."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.1
  google_sign_in: ^6.2.2

  # State Management & Utils
  provider: ^6.1.2
  shared_preferences: ^2.3.5
  http: ^1.3.0
  intl: ^0.20.2
  file_picker: ^8.1.7
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0
  
  # UI
  flutter_spinkit: ^5.2.1 # For splash/loading
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - .env
